<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProductBrowse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --border: #000000;
      --accent: #000000;
      --accent-hover: #333333;
      --text-primary: #000000;
      --text-muted: #555555;
      --header-height: 70px;
      --filter-bar-height: 64px;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: var(--bg);
      background-attachment: fixed;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      line-height: 1.5;
      min-height: 100vh;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-height);
      background-color: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      z-index: 100;
    }

    .header-logo {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .header-tagline {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .filter-bar {
      position: sticky;
      top: var(--header-height);
      background-color: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      min-height: var(--filter-bar-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 2rem;
      z-index: 90;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 1rem;
    }

    .filter-controls {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-input,
    .category-select,
    .sort-select {
      background-color: var(--surface);
      color: var(--text-primary);
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-input:focus,
    .category-select:focus,
    .sort-select:focus {
      border-color: var(--accent);
    }

    .search-input {
      width: 240px;
    }

    .result-count {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    main {
      padding: 2rem;
      margin-top: var(--header-height);
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
    }

    @media (max-width: 900px) {
      .product-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 600px) {
      .product-grid { grid-template-columns: 1fr; }
      header { padding: 0 1rem; }
      .filter-bar { padding: 0 1rem; }
      main { padding: 1rem; }
    }

    .product-card {
      background-color: var(--surface);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    .product-card:hover {
      transform: translateY(-4px) scale(1.01);
      border-color: var(--accent);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      background-color: var(--surface);
    }

    .product-name {
      font-size: 1.125rem;
      font-weight: 500;
      color: var(--text-primary);
    }

    .product-category {
      align-self: flex-start;
      background-color: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 0.25rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .product-price {
      font-size: 1.25rem;
      font-weight: 600;
    }

    .product-date {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: auto;
    }

    .pagination-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 3rem;
      margin-bottom: 2rem;
    }

    .btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-1px);
      background: var(--accent-hover);
    }

    .btn:disabled {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: not-allowed;
      box-shadow: none;
    }

    .page-info {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-primary);
      background-color: var(--surface);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .hidden {
      display: none !important;
    }

    /* Skeleton Loader */
    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
      margin-top: 1.5rem;
    }
    
    @media (max-width: 900px) {
      .skeleton-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 600px) {
      .skeleton-grid { grid-template-columns: 1fr; }
    }

    .skeleton-card {
      background-color: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      height: 180px;
    }

    .skeleton-line {
      background-color: var(--border);
      border-radius: 4px;
      animation: pulse 1.5s infinite ease-in-out;
    }

    .skeleton-line.title { height: 1.125rem; width: 80%; }
    .skeleton-line.pill { height: 1.5rem; width: 40%; border-radius: 9999px; }
    .skeleton-line.price { height: 1.5rem; width: 50%; }
    .skeleton-line.date { height: 0.75rem; width: 30%; margin-top: auto; }

    @keyframes pulse {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-logo">ProductBrowse</div>
    <div class="header-tagline">Fast. Scalable. Pagination.</div>
  </header>

  <div class="filter-bar">
    <div class="filter-controls">
      <input type="text" id="search-input" class="search-input" placeholder="Search products..." />
      <select id="category-filter" class="category-select">
        <option value="">All Categories</option>
      </select>
      <select id="sort-select" class="sort-select">
        <option value="newest">Newest First</option>
        <option value="price_asc">Price: Low to High</option>
        <option value="price_desc">Price: High to Low</option>
      </select>
    </div>
    <div class="result-count" id="count-display"></div>
  </div>

  <main>
    <div id="product-grid" class="product-grid"></div>
    
    <div id="skeleton-container" class="skeleton-grid hidden">
      <div class="skeleton-card">
        <div class="skeleton-line title"></div>
        <div class="skeleton-line pill"></div>
        <div class="skeleton-line price"></div>
        <div class="skeleton-line date"></div>
      </div>
      <div class="skeleton-card">
        <div class="skeleton-line title"></div>
        <div class="skeleton-line pill"></div>
        <div class="skeleton-line price"></div>
        <div class="skeleton-line date"></div>
      </div>
      <div class="skeleton-card">
        <div class="skeleton-line title"></div>
        <div class="skeleton-line pill"></div>
        <div class="skeleton-line price"></div>
        <div class="skeleton-line date"></div>
      </div>
    </div>

    <div class="pagination-container">
      <button id="prev-btn" class="btn hidden">&larr; Prev</button>
      <div id="page-info" class="page-info hidden">Page 1</div>
      <button id="next-btn" class="btn hidden">Next &rarr;</button>
    </div>
  </main>

  <script>
    // State variables
    let currentCategory = '';
    let currentSearch = '';
    let currentSort = 'newest';
    let isLoading = false;
    let pageHistory = [null]; // Index 0 is page 1 (null cursor)
    let currentPageIndex = 0;
    let nextCursor = null;

    const grid = document.getElementById('product-grid');
    const skeleton = document.getElementById('skeleton-container');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const pageInfo = document.getElementById('page-info');
    const categoryFilter = document.getElementById('category-filter');
    const searchInput = document.getElementById('search-input');
    const sortSelect = document.getElementById('sort-select');
    const countDisplay = document.getElementById('count-display');

    const priceFormatter = new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR' });

    // Debounce helper to prevent calling the database on every keystroke
    function debounce(func, delay) {
      let timeoutId;
      return function (...args) {
        clearTimeout(timeoutId);
        timeoutId = setTimeout(() => {
          func.apply(this, args);
        }, delay);
      };
    }

    function renderCard(product) {
      const dateStr = new Date(product.created_at).toLocaleDateString('en-GB', {
        day: 'numeric', month: 'short', year: 'numeric'
      });
      const priceStr = priceFormatter.format(product.price);
      
      return `
        <a href="/product.html?id=${product.id}" class="product-card" style="text-decoration: none;">
          <div class="product-name">${product.name}</div>
          <div class="product-category">${product.category}</div>
          <div class="product-price">${priceStr}</div>
          <div class="product-date">Added on ${dateStr}</div>
        </a>
      `;
    }

    function updatePaginationUI(hasMore) {
      prevBtn.classList.remove('hidden');
      nextBtn.classList.remove('hidden');
      pageInfo.classList.remove('hidden');

      prevBtn.disabled = currentPageIndex === 0;
      nextBtn.disabled = !hasMore;
      pageInfo.textContent = `Page ${currentPageIndex + 1}`;
    }

    async function fetchProducts(reset = false) {
      if (isLoading) return;
      isLoading = true;
      
      if (reset) {
        pageHistory = [null];
        currentPageIndex = 0;
      }

      const activeCursor = pageHistory[currentPageIndex];

      grid.innerHTML = ''; // Clear for Next/Prev pagination
      prevBtn.classList.add('hidden');
      nextBtn.classList.add('hidden');
      pageInfo.classList.add('hidden');
      skeleton.classList.remove('hidden');

      try {
        let url = `/api/products?limit=20&sort=${encodeURIComponent(currentSort)}`;
        if (activeCursor) {
          url += `&cursor=${encodeURIComponent(activeCursor)}`;
        }
        if (currentCategory) {
          url += `&category=${encodeURIComponent(currentCategory)}`;
        }
        if (currentSearch) {
          url += `&search=${encodeURIComponent(currentSearch)}`;
        }

        const res = await fetch(url);
        const data = await res.json();

        if (data.data && data.data.length > 0) {
          const cardsHtml = data.data.map(p => renderCard(p)).join('');
          grid.innerHTML = cardsHtml;
        } else {
          grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--text-muted);">No products found.</div>';
        }

        nextCursor = data.nextCursor;
        countDisplay.textContent = `Browsing Page ${currentPageIndex + 1}`; 

        if (data.hasMore && pageHistory.length === currentPageIndex + 1) {
          pageHistory.push(nextCursor);
        }

        updatePaginationUI(data.hasMore);

      } catch (err) {
        console.error("Failed to fetch products", err);
      } finally {
        isLoading = false;
        skeleton.classList.add('hidden');
      }
    }

    // Dynamically load categories from API and update filter options
    async function loadCategories() {
      try {
        const res = await fetch('/api/products/categories');
        const categories = await res.json();
        
        categoryFilter.innerHTML = '<option value="">All Categories</option>' + 
          categories.map(cat => `<option value="${cat}">${cat}</option>`).join('');
      } catch (err) {
        console.error("Failed to load categories", err);
      }
    }

    categoryFilter.addEventListener('change', (e) => {
      currentCategory = e.target.value;
      fetchProducts(true);
    });

    searchInput.addEventListener('input', debounce((e) => {
      currentSearch = e.target.value;
      fetchProducts(true);
    }, 300));

    sortSelect.addEventListener('change', (e) => {
      currentSort = e.target.value;
      fetchProducts(true);
    });

    prevBtn.addEventListener('click', () => {
      if (currentPageIndex > 0) {
        currentPageIndex--;
        fetchProducts(false);
      }
    });

    nextBtn.addEventListener('click', () => {
      if (pageHistory.length > currentPageIndex + 1) {
        currentPageIndex++;
        fetchProducts(false);
      }
    });

    // Initial load
    loadCategories();
    fetchProducts(true);
  </script>
</body>
</html>
